<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clan Shangri-La Camp Meals</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { 
  font-family: system-ui, -apple-system, sans-serif; 
  background:#f5f7fa; 
  margin:0; 
  padding:12px; 
}

h1,h2,h3,h4 { margin-top:0; }

button { 
  padding:10px 14px; 
  font-size:1em; 
  cursor:pointer; 
  background:#4f46e5; 
  color:#fff; 
  border:none; 
  border-radius:6px; 
}

button.secondary { background:#6b7280; }
button.danger { background:#dc2626; }

.day { 
  background:#fff; 
  border-radius:12px; 
  padding:16px; 
  margin-bottom:20px; 
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  width:100%;
  box-sizing:border-box;
}

.slot { 
  border-left:4px solid #4f46e5; 
  padding-left:12px; 
  margin-top:16px; 
}

.headcount-row {
  margin-top:6px;
  margin-bottom:10px;
  font-size:.9em;
}

.headcount-row input {
  width:80px;
  padding:6px;
  border-radius:6px;
  border:1px solid #d1d5db;
  margin-left:6px;
}

.item-row { 
  display:flex; 
  justify-content:space-between; 
  align-items:center; 
  margin:6px 0; 
  padding:10px; 
  border-radius:8px; 
  border:1px solid #e5e7eb;
  background:#fafafa;
  flex-wrap:wrap;
}

.item-row .left { font-weight:500; }

.item-actions {
  display:flex;
  align-items:center;
  gap:6px;
}

.unclaimed {
  border:2px solid #dc2626 !important;
  background:#fef2f2;
}

.badge { 
  font-size:.75em; 
  font-weight:600; 
  color:#fff; 
  background:#4f46e5; 
  padding:4px 8px; 
  border-radius:999px; 
}

.addItemContainer { 
  display:flex; 
  gap:6px; 
  margin-top:8px; 
  flex-wrap:wrap; 
}

.addItemContainer input { 
  flex:1; 
  padding:8px; 
  border-radius:6px; 
  border:none; 
  background:#e5e7eb; 
}

.admin { 
  font-size:.85em; 
  color:#6b7280; 
  margin:10px 0; 
  display:flex; 
  flex-wrap:wrap; 
  gap:8px; 
}

a { 
  color:#4f46e5; 
  text-decoration:none; 
  font-weight:500;
}

/* Mobile optimization */
@media (max-width: 640px) {

  .item-row {
    flex-direction:column;
    align-items:flex-start;
  }

  .item-actions {
    width:100%;
    margin-top:8px;
    flex-wrap:wrap;
  }

  .item-actions button {
    margin-top:4px;
  }
}
</style>
</head>
<body>

<a href="./">← Back to events</a>
<h1 id="eventName"></h1>
<div id="potluck"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1.35.7/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://amayopmpqvkqbdlkbkog.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtYXlvcG1wcXZrcWJkbGtia29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTM3NTQsImV4cCI6MjA4NzM4OTc1NH0.7k5eEc3RY4COJMIvDtffwI2eGalY5k0CWARAEkuyJ-M";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function uid(){return Math.random().toString(36).slice(2);}

const potluckDiv = document.getElementById('potluck');
const eventNameH1 = document.getElementById('eventName');

let currentEvent = null;

// Load event
async function loadEvent(eventId){
  const { data, error } = await supabaseClient
    .from('events')
    .select('*')
    .eq('id', eventId)
    .single();

  if(error){console.error(error); alert('Failed to load event'); return;}
  currentEvent = data;
  renderEvent();
}

// Save event
async function saveEvent(){
  const { error } = await supabaseClient
    .from('events')
    .update({data: currentEvent.data})
    .eq('id', currentEvent.id);

  if(error){console.error(error); alert('Save failed'); return;}
  loadEvent(currentEvent.id);
}

// Render event
function renderEvent(){
  eventNameH1.textContent = currentEvent.name;
  potluckDiv.innerHTML='';

  const adminBar=document.createElement('div'); 
  adminBar.className='admin';

  const lockBtn=document.createElement('button'); 
  lockBtn.textContent=currentEvent.locked?'Unlock Signups':'Lock Signups'; 
  lockBtn.className='secondary';

  lockBtn.onclick=async ()=>{
    const key=prompt('Admin key?'); 
    if(key!==currentEvent.admin_key){alert('Unauthorized'); return;}
    await supabaseClient
      .from('events')
      .update({locked:!currentEvent.locked})
      .eq('id',currentEvent.id);
    loadEvent(currentEvent.id);
  };

  adminBar.append(lockBtn);
  potluckDiv.appendChild(adminBar);

  currentEvent.data.forEach(day=>{
    const dayDiv=document.createElement('div'); 
    dayDiv.className='day'; 
    dayDiv.innerHTML=`<h2>${day.day}</h2>`;

    day.slots.forEach(slot=>{
      if(slot.headcount === undefined) slot.headcount = 0;

      const slotDiv=document.createElement('div'); 
      slotDiv.className='slot'; 
      slotDiv.innerHTML=`<h3>${slot.time}</h3>`;

      // Headcount
      const headcountRow=document.createElement('div');
      headcountRow.className='headcount-row';
      headcountRow.innerHTML=`Headcount:`;

      const headcountInput=document.createElement('input');
      headcountInput.type='number';
      headcountInput.min='0';
      headcountInput.value=slot.headcount;

      headcountInput.onchange=async ()=>{
        slot.headcount=parseInt(headcountInput.value)||0;
        await saveEvent();
      };

      headcountRow.appendChild(headcountInput);
      slotDiv.appendChild(headcountRow);

      const itemsContainer=document.createElement('div');

      slot.items.forEach(item=>{
        const itemRow=document.createElement('div'); 
        itemRow.className='item-row';

        if(!item.claimed_by){
          itemRow.classList.add('unclaimed');
        }

        const left=document.createElement('div'); 
        left.className='left'; 
        left.textContent=item.item;

        const actions=document.createElement('div'); 
        actions.className='item-actions';

        if(item.claimed_by){ 
          const badge=document.createElement('span'); 
          badge.className='badge'; 
          badge.textContent=item.claimed_by; 
          actions.appendChild(badge); 
        }

        const claimBtn=document.createElement('button'); 
        claimBtn.textContent=item.claimed_by?'Unclaim':'Claim'; 
        claimBtn.className='secondary';

        claimBtn.onclick=async ()=>{
          if(!item.claimed_by){
            const name=prompt('Enter your name to claim this item:'); 
            if(!name) return alert('Name required'); 
            item.claimed_by=name;
          }else{ 
            item.claimed_by=null; 
          }
          await saveEvent();
        };

        const delBtn=document.createElement('button'); 
        delBtn.textContent='Delete'; 
        delBtn.className='danger';

        delBtn.onclick=async ()=>{
          if(!confirm('Delete this item?')) return;
          slot.items=slot.items.filter(i=>i!==item);
          await saveEvent();
        };

        actions.append(claimBtn, delBtn);
        itemRow.append(left,actions);
        itemsContainer.appendChild(itemRow);
      });

      const addRow=document.createElement('div'); 
      addRow.className='addItemContainer';

      const addInput=document.createElement('input'); 
      addInput.placeholder='Food item (required)';

      const addNameInput=document.createElement('input'); 
      addNameInput.placeholder='Your name (optional)';

      const addBtn=document.createElement('button'); 
      addBtn.textContent='+';

      addBtn.onclick=async ()=>{
        if(!addInput.value.trim()) return alert('Food item required');
        slot.items.push({ 
          id:uid(), 
          item:addInput.value.trim(), 
          claimed_by:addNameInput.value.trim()||null 
        });
        await saveEvent();
      };

      addRow.append(addInput,addNameInput,addBtn);
      itemsContainer.appendChild(addRow);

      slotDiv.appendChild(itemsContainer);
      dayDiv.appendChild(slotDiv);
    });

    potluckDiv.appendChild(dayDiv);
  });
}

// Init
const params = new URLSearchParams(location.search);
if(params.get('event')) loadEvent(params.get('event'));
else potluckDiv.innerHTML='<p>No event selected.</p>';
</script>

</body>
</html>
